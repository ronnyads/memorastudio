<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <filter id="grainLight3" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
    </filter>
  </defs>

  <!-- Clean family group scene -->
  <rect width="800" height="600" fill="#C8D8E8"/>

  <!-- Sky -->
  <rect x="0" y="0" width="800" height="300" fill="#A8CDE0"/>
  <!-- Ground / park -->
  <rect x="0" y="300" width="800" height="300" fill="#7DB06A"/>
  <ellipse cx="400" cy="300" rx="500" ry="30" fill="#8BC07A"/>

  <!-- Person 1 -->
  <ellipse cx="280" cy="220" rx="45" ry="55" fill="#E8CCA8"/>
  <ellipse cx="268" cy="210" rx="6" ry="4" fill="#5A4A3A"/>
  <ellipse cx="292" cy="210" rx="6" ry="4" fill="#5A4A3A"/>
  <path d="M 270 230 Q 280 240 290 230" stroke="#8A6A5A" stroke-width="1.5" fill="none"/>
  <rect x="240" y="270" width="80" height="150" rx="10" fill="#5080B0"/>

  <!-- Person 2 -->
  <ellipse cx="400" cy="200" rx="50" ry="60" fill="#E4C8A4"/>
  <ellipse cx="386" cy="190" rx="7" ry="5" fill="#5A4A3A"/>
  <ellipse cx="414" cy="190" rx="7" ry="5" fill="#5A4A3A"/>
  <path d="M 386 210 Q 400 225 414 210" stroke="#8A6A5A" stroke-width="1.5" fill="none"/>
  <rect x="355" y="255" width="90" height="160" rx="10" fill="#906050"/>

  <!-- Person 3 -->
  <ellipse cx="520" cy="225" rx="42" ry="52" fill="#ECD0AC"/>
  <ellipse cx="508" cy="215" rx="6" ry="4" fill="#5A4A3A"/>
  <ellipse cx="532" cy="215" rx="6" ry="4" fill="#5A4A3A"/>
  <path d="M 510 235 Q 520 245 530 235" stroke="#8A6A5A" stroke-width="1.5" fill="none"/>
  <rect x="482" y="272" width="76" height="145" rx="10" fill="#409060"/>

  <!-- Light grain -->
  <rect width="800" height="600" filter="url(#grainLight3)" opacity="0.08"/>

  <text x="760" y="585" font-family="sans-serif" font-size="11" fill="rgba(0,0,0,0.12)" text-anchor="end">DEMO</text>
</svg>