<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Sepia filter -->
    <filter id="sepia" x="0" y="0" width="100%" height="100%">
      <feColorMatrix type="matrix" values="0.393 0.769 0.189 0 0
                                            0.349 0.686 0.168 0 0
                                            0.272 0.534 0.131 0 0
                                            0     0     0     1 0"/>
    </filter>
    <!-- Grain -->
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
    </filter>
    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.6)"/>
    </radialGradient>
  </defs>

  <!-- Base scene: warm portrait-like background -->
  <rect width="800" height="600" fill="#8B7355"/>
  <rect x="150" y="80" width="500" height="440" rx="8" fill="#A08060" filter="url(#sepia)"/>
  <!-- Simulated face shape -->
  <ellipse cx="400" cy="260" rx="120" ry="150" fill="#C4A882" filter="url(#sepia)"/>
  <ellipse cx="400" cy="220" rx="90" ry="70" fill="#B89B78"/>
  <!-- Shoulders -->
  <ellipse cx="400" cy="480" rx="180" ry="100" fill="#9A8468" filter="url(#sepia)"/>

  <!-- Scratches -->
  <line x1="120" y1="50" x2="680" y2="550" stroke="rgba(255,255,220,0.3)" stroke-width="2"/>
  <line x1="200" y1="0" x2="750" y2="480" stroke="rgba(255,255,220,0.25)" stroke-width="1.5"/>
  <line x1="50" y1="200" x2="600" y2="580" stroke="rgba(255,255,200,0.2)" stroke-width="3"/>
  <line x1="300" y1="0" x2="100" y2="600" stroke="rgba(255,255,220,0.15)" stroke-width="2"/>
  <line x1="500" y1="30" x2="700" y2="400" stroke="rgba(255,255,200,0.2)" stroke-width="1"/>

  <!-- Stains/spots -->
  <circle cx="250" cy="150" r="40" fill="rgba(80,60,30,0.3)"/>
  <circle cx="600" cy="400" r="55" fill="rgba(60,40,20,0.25)"/>
  <ellipse cx="150" cy="450" rx="60" ry="40" fill="rgba(70,50,25,0.2)"/>

  <!-- Grain overlay -->
  <rect width="800" height="600" filter="url(#grain)" opacity="0.4"/>

  <!-- Vignette -->
  <rect width="800" height="600" fill="url(#vignette)"/>

  <!-- DEMO watermark -->
  <text x="760" y="585" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.3)" text-anchor="end">DEMO</text>
</svg>