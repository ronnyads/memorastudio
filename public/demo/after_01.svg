<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <filter id="grainLight" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
    </filter>
  </defs>

  <!-- Clean background -->
  <rect width="800" height="600" fill="#D4C4A8"/>
  <rect x="150" y="80" width="500" height="440" rx="8" fill="#E8D8C0"/>

  <!-- Clean portrait -->
  <ellipse cx="400" cy="260" rx="120" ry="150" fill="#E0C8A8"/>
  <ellipse cx="400" cy="220" rx="90" ry="70" fill="#D5BFA0"/>
  <!-- Eyes -->
  <ellipse cx="370" cy="230" rx="12" ry="8" fill="#6B5B4A"/>
  <ellipse cx="430" cy="230" rx="12" ry="8" fill="#6B5B4A"/>
  <!-- Smile -->
  <path d="M 370 270 Q 400 295 430 270" stroke="#8B7B6A" stroke-width="2" fill="none"/>
  <!-- Shoulders -->
  <ellipse cx="400" cy="480" rx="180" ry="100" fill="#C8B498"/>

  <!-- Subtle warm tone -->
  <rect width="800" height="600" fill="rgba(255,240,220,0.1)"/>

  <!-- Light grain -->
  <rect width="800" height="600" filter="url(#grainLight)" opacity="0.15"/>

  <!-- DEMO watermark -->
  <text x="760" y="585" font-family="sans-serif" font-size="11" fill="rgba(0,0,0,0.15)" text-anchor="end">DEMO</text>
</svg>