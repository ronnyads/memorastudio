<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <filter id="grainLight2" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
    </filter>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#B8D4E8"/>
      <stop offset="100%" stop-color="#D4C8A0"/>
    </linearGradient>
  </defs>

  <!-- Bright landscape -->
  <rect width="800" height="600" fill="url(#sky)"/>

  <!-- Rolling hills -->
  <ellipse cx="200" cy="420" rx="300" ry="120" fill="#6B8E50"/>
  <ellipse cx="600" cy="400" rx="350" ry="140" fill="#5A7D42"/>
  <rect x="0" y="450" width="800" height="150" fill="#4A6E35"/>

  <!-- Trees -->
  <ellipse cx="200" cy="300" rx="60" ry="80" fill="#3D6B30"/>
  <rect x="195" y="370" width="10" height="40" fill="#5A4030"/>
  <ellipse cx="600" cy="280" rx="50" ry="70" fill="#4A7A3A"/>
  <rect x="596" y="340" width="8" height="35" fill="#5A4030"/>
  <ellipse cx="450" cy="320" rx="40" ry="55" fill="#3A6528"/>
  <rect x="447" y="365" width="7" height="30" fill="#5A4030"/>

  <!-- Sun -->
  <circle cx="600" cy="100" r="45" fill="#FFE4A0" opacity="0.9"/>
  <circle cx="600" cy="100" r="60" fill="#FFE4A0" opacity="0.2"/>

  <!-- Light grain -->
  <rect width="800" height="600" filter="url(#grainLight2)" opacity="0.1"/>

  <text x="760" y="585" font-family="sans-serif" font-size="11" fill="rgba(0,0,0,0.15)" text-anchor="end">DEMO</text>
</svg>