<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <filter id="darken" x="0" y="0" width="100%" height="100%">
      <feColorMatrix type="matrix" values="0.3 0 0 0 0
                                            0 0.25 0 0 0
                                            0 0 0.2 0 0
                                            0 0 0 1 0"/>
    </filter>
    <filter id="grain2" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
    </filter>
    <radialGradient id="heavyVignette" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="70%" stop-color="rgba(0,0,0,0.5)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.85)"/>
    </radialGradient>
  </defs>

  <!-- Very dark scene -->
  <rect width="800" height="600" fill="#1A1510"/>

  <!-- Landscape elements barely visible -->
  <rect x="0" y="350" width="800" height="250" fill="#252015"/>
  <ellipse cx="200" cy="300" rx="150" ry="180" fill="#1E1A12"/>
  <ellipse cx="600" cy="280" rx="120" ry="200" fill="#1C1810"/>
  <!-- Sky hint -->
  <rect x="0" y="0" width="800" height="350" fill="#1F1A14"/>
  <circle cx="600" cy="100" r="40" fill="#2A2218" filter="url(#darken)"/>

  <!-- Grain -->
  <rect width="800" height="600" filter="url(#grain2)" opacity="0.5"/>

  <!-- Heavy vignette -->
  <rect width="800" height="600" fill="url(#heavyVignette)"/>

  <!-- Extra darkness -->
  <rect width="800" height="600" fill="rgba(0,0,0,0.3)"/>

  <text x="760" y="585" font-family="sans-serif" font-size="11" fill="rgba(255,255,255,0.2)" text-anchor="end">DEMO</text>
</svg>